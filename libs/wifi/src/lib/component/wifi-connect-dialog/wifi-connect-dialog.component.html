<div class="flex flex-col gap-4 p-4 min-w-[280px]">
  <h2 class="text-lg font-medium m-0">WiFi に接続</h2>
  <form class="flex flex-col gap-3" (ngSubmit)="$event.preventDefault(); connect()">
    <mat-form-field appearance="outline">
      <mat-label>SSID</mat-label>
      <input matInput name="ssid" [(ngModel)]="ssid" [disabled]="connecting()" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>パスワード</mat-label>
      <input
        matInput
        [type]="passwordVisible() ? 'text' : 'password'"
        name="password"
        [(ngModel)]="password"
        [disabled]="connecting()"
        autocomplete="off"
      />
      <button
        mat-icon-button
        matSuffix
        type="button"
        (click)="togglePasswordVisibility()"
        [disabled]="connecting()"
        [attr.aria-label]="
          passwordVisible() ? 'パスワードを隠す' : 'パスワードを表示'
        "
        [attr.aria-pressed]="passwordVisible()"
      >
        <mat-icon>{{
          passwordVisible() ? 'visibility_off' : 'visibility'
        }}</mat-icon>
      </button>
    </mat-form-field>
    @if (feedback(); as fb) {
      <p
        class="m-0 text-sm"
        [class.text-red-700]="fb.kind === 'error'"
        [class.text-green-700]="fb.kind === 'success'"
        role="status"
      >
        {{ fb.message }}
      </p>
    }
    <div class="flex justify-end gap-2">
      <button
        mat-stroked-button
        type="button"
        (click)="cancel()"
        [disabled]="connecting()"
      >
        キャンセル
      </button>
      <button mat-flat-button color="primary" type="submit" [disabled]="connecting()">
        @if (connecting()) {
          接続中…
        } @else {
          接続
        }
      </button>
    </div>
  </form>
</div>
