<div
  class="flex min-h-0 h-full w-full flex-col items-stretch overflow-hidden p-3 sm:p-4"
>
  <div
    class="flex min-h-0 w-full flex-1 flex-col gap-3 overflow-hidden rounded bg-white p-3 shadow-lg sm:p-5"
  >
    <div class="flex flex-wrap items-center justify-between gap-2">
      <choh-button
        [label]="scanInProgress() ? 'スキャン中…' : '再スキャン'"
        type="button"
        (clickEvent)="runWifiScan()"
        [disabled]="scanInProgress() || busy()"
      />
      <choh-button
        [label]="'手動で接続'"
        type="button"
        (clickEvent)="openManualConnectDialog()"
        [disabled]="busy()"
      />
    </div>

    <choh-wifi-list
      class="flex min-h-0 flex-1 flex-col"
      [wifiInfoList]="wifiInfoList()"
      [scanInProgress]="scanInProgress()"
      [scanError]="scanError()"
      [selectedAddress]="selectedAddress()"
      [connectedSsid]="connectedSsid()"
      [connectDisabled]="scanInProgress() || busy()"
      (networkSelected)="onNetworkSelected($event)"
      (networkConnect)="onNetworkConnect($event)"
    />

    <mat-divider />

    <div class="flex flex-wrap gap-2 justify-start w-full">
      <choh-button
        [label]="'Wifi Info'"
        type="button"
        (clickEvent)="showWifiInfo()"
        [disabled]="scanInProgress() || busy()"
      />
      <choh-button
        [label]="'疎通確認'"
        type="button"
        (clickEvent)="checkConnectivity()"
        [disabled]="scanInProgress() || busy()"
      />
      <choh-button
        [label]="'Reset Wifi'"
        type="button"
        (clickEvent)="resetWifi()"
        [disabled]="scanInProgress() || busy()"
      />
      <choh-button
        [label]="'Reboot'"
        type="button"
        (clickEvent)="rebootDevice()"
        [disabled]="scanInProgress() || busy()"
      />
    </div>
  </div>
</div>
