@let isConnected = connected();
@let isLogoutPending = logoutPending();

<div class="relative flex h-[100dvh] min-h-0 flex-col overflow-hidden">
  <div
    class="shrink-0"
    [class.border-b]="isConnected"
    [class.border-gray-200]="isConnected"
  >
    <lib-header-toolbar
      (eventConnect)="onConnect()"
      (eventDisConnect)="onDisConnect()"
    />
    @if (isConnected) {
      <lib-breadcrumb
        [segments]="breadcrumbSegments()"
        (segmentNavigate)="onBreadcrumbNavigate($event)"
      />
    }
  </div>
  <div class="flex min-h-0 flex-1 flex-col overflow-hidden">
    @if (isConnected) {
      <div
        class="grid h-full min-h-0 gap-x-0 gap-y-0"
        [style.grid-template-columns]="gridTemplateColumns()"
      >
        <div class="flex min-h-0 min-w-0 flex-col overflow-hidden">
          <lib-left-sidebar
            [leftNavOpen]="leftNavOpen()"
            (toggleLeftSidebar)="onToggleLeftSidebar()"
          />
        </div>

        <div class="flex min-h-0 min-w-0 flex-col overflow-hidden">
          <lib-action-tool-bar
            [connected]="isConnected"
            (toolbarAction)="onToolbarAction($event)"
          />
          <div class="min-h-0 flex-1 overflow-hidden">
            <router-outlet />
          </div>
        </div>

        <div
          class="flex min-h-0 min-w-0 flex-col overflow-hidden border-l border-gray-200"
        >
          <lib-right-sidebar
            class="min-h-0 min-w-0 flex-1"
            [rightNavOpen]="rightNavOpen()"
            (toggleRightSidebar)="onToggleRightSidebar()"
          />
        </div>
      </div>
    } @else {
      <lib-connect-page />
    }
  </div>

  @if (isLogoutPending) {
    <div
      class="absolute inset-0 z-50 flex flex-col items-center justify-center gap-4 bg-black/40"
      role="alertdialog"
      aria-modal="true"
      aria-busy="true"
      aria-label="ログアウト処理中"
    >
      <mat-progress-spinner
        mode="indeterminate"
        diameter="64"
        aria-label="ログアウト処理中"
      />
      <p class="rounded bg-white px-4 py-2 text-sm text-gray-800 shadow">
        ログアウト処理中です。完了までお待ちください…
      </p>
    </div>
  }
</div>
