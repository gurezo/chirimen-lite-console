<div
  class="box-border flex h-full min-h-0 min-w-0 flex-col overflow-hidden"
  [style.width.px]="rootWidthPx()"
  [style.min-width.px]="rootMinWidthPx()"
  [style.max-width.px]="rootMaxWidthPx()"
  [style.resize]="rootResize()"
  [style.direction]="rootDirection()"
>
  <div
    class="flex min-h-0 min-w-0 flex-1 flex-row overflow-hidden"
    style="direction: ltr"
  >
    <div
      class="flex shrink-0 flex-col items-center gap-1 border-r border-gray-200 bg-white py-2"
    >
      <button
        mat-icon-button
        type="button"
        aria-label="Toggle right panel"
        (click)="toggleRightSidebar.emit()"
      >
        <mat-icon>fiber_pin</mat-icon>
      </button>
      <button
        mat-icon-button
        type="button"
        [attr.aria-label]="
          rightNavOpen() ? 'Close right panel' : 'Open right panel'
        "
        (click)="toggleRightSidebar.emit()"
      >
        <mat-icon>
          @if (rightNavOpen()) {
            right_panel_close
          } @else {
            right_panel_open
          }
        </mat-icon>
      </button>
    </div>
    @if (rightNavOpen()) {
      @if (isOverlay()) {
        <div
          class="absolute top-0 right-full bottom-0 z-40 box-border flex min-h-0 flex-col overflow-hidden border-l border-gray-200 bg-white shadow-lg"
          [style.width]="overlayWidth()"
          [style.min-width]="overlayMinWidth()"
          [style.max-width]="overlayMaxWidth()"
          [style.resize]="'horizontal'"
          [style.direction]="'rtl'"
        >
          <div
            class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden"
            style="direction: ltr"
          >
            <choh-pin-assign />
          </div>
        </div>
      } @else {
        <div
          class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden bg-white"
        >
          <choh-pin-assign />
        </div>
      }
    }
  </div>
</div>
