<div class="right-sidebar">
  <div class="right-sidebar__rail">
    <button
      mat-icon-button
      type="button"
      aria-label="Toggle right panel"
      (click)="toggleRightSidebar.emit()"
    >
      <mat-icon>fiber_pin</mat-icon>
    </button>
    <button
      mat-icon-button
      type="button"
      [attr.aria-label]="
        rightNavOpen() ? 'Close right panel' : 'Open right panel'
      "
      (click)="toggleRightSidebar.emit()"
    >
      <mat-icon>
        @if (rightNavOpen()) {
          right_panel_close
        } @else {
          right_panel_open
        }
      </mat-icon>
    </button>
  </div>
  @if (rightNavOpen()) {
    @if (isOverlay()) {
      <div class="right-sidebar__overlay">
        <div class="right-sidebar__overlay-inner">
          <choh-pin-assign />
        </div>
      </div>
    } @else {
      <div class="right-sidebar__diagram">
        <choh-pin-assign />
      </div>
    }
  }
</div>
