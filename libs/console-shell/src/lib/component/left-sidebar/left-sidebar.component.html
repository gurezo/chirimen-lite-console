<div class="left-sidebar">
  @if (leftNavOpen()) {
    @if (isOverlay()) {
      <div class="left-sidebar__overlay">
        <lib-file-tree-feature
          [currentPath]="shellStore.fileManagerCurrentPath()"
          (currentPathChange)="onCurrentPathChange($event)"
          (fileSelected)="onFileSelected($event)"
        />
      </div>
    } @else {
      <div class="left-sidebar__tree">
        <lib-file-tree-feature
          [currentPath]="shellStore.fileManagerCurrentPath()"
          (currentPathChange)="onCurrentPathChange($event)"
          (fileSelected)="onFileSelected($event)"
        />
      </div>
    }
  }
  <div class="left-sidebar__rail">
    <button
      mat-icon-button
      type="button"
      aria-label="Toggle left panel"
      (click)="toggleLeftSidebar.emit()"
    >
      <mat-icon>folder</mat-icon>
    </button>
    <button
      mat-icon-button
      type="button"
      [attr.aria-label]="
        leftNavOpen() ? 'Close left panel' : 'Open left panel'
      "
      (click)="toggleLeftSidebar.emit()"
    >
      <mat-icon>
        @if (leftNavOpen()) {
          left_panel_close
        } @else {
          left_panel_open
        }
      </mat-icon>
    </button>
  </div>
</div>
