<div
  class="left-sidebar relative flex min-h-0 min-w-0 flex-1 flex-row overflow-hidden border-r border-gray-200"
>
  @if (leftNavOpen()) {
    @if (isOverlay()) {
      <div
        class="absolute top-0 bottom-0 left-full z-40 flex min-h-0 min-w-0 flex-col overflow-hidden border-r border-gray-200 bg-white shadow-lg"
        [style.width]="overlayPaneWidth()"
      >
        <lib-file-tree-feature
          [currentPath]="shellStore.fileManagerCurrentPath()"
          (currentPathChange)="onCurrentPathChange($event)"
          (fileSelected)="onFileSelected($event)"
        />
        <div
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize left panel"
          tabindex="0"
          class="absolute top-0 right-0 bottom-0 z-50 w-1.5 cursor-col-resize touch-none bg-transparent hover:bg-blue-500/40"
          (pointerdown)="onResizePointerDown($event)"
        ></div>
      </div>
    } @else {
      <div class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden bg-white">
        <lib-file-tree-feature
          [currentPath]="shellStore.fileManagerCurrentPath()"
          (currentPathChange)="onCurrentPathChange($event)"
          (fileSelected)="onFileSelected($event)"
        />
      </div>
    }
  }
  <div
    class="relative flex shrink-0 flex-col items-center gap-1 border-l border-gray-200 bg-white py-2"
  >
    <button
      mat-icon-button
      type="button"
      aria-label="Toggle left panel"
      (click)="toggleLeftSidebar.emit()"
    >
      <mat-icon>folder</mat-icon>
    </button>
    <button
      mat-icon-button
      type="button"
      [attr.aria-label]="
        leftNavOpen() ? 'Close left panel' : 'Open left panel'
      "
      (click)="toggleLeftSidebar.emit()"
    >
      <mat-icon>
        @if (leftNavOpen()) {
          left_panel_close
        } @else {
          left_panel_open
        }
      </mat-icon>
    </button>
    @if (leftNavOpen() && !isOverlay()) {
      <div
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize left panel"
        tabindex="0"
        class="absolute top-0 right-0 bottom-0 z-50 w-1.5 cursor-col-resize touch-none bg-transparent hover:bg-blue-500/40"
        (pointerdown)="onResizePointerDown($event)"
      ></div>
    }
  </div>
</div>
